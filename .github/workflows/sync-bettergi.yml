name: Sync BetterGI Release

on:
  schedule:
    # GitHub scheduled events are best-effort and may be delayed or dropped.
    # Try twice per hour; the sync script is idempotent and skips published runs.
    - cron: "13,43 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: sync-bettergi
  cancel-in-progress: false

jobs:
  sync:
    name: Sync upstream artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync BetterGI artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/sync-bettergi.ps1

      - name: Commit sync state
        shell: bash
        run: |
          if git diff --quiet -- state/latest.json; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/latest.json
          git commit -m "chore: update BetterGI sync state"
          git push
