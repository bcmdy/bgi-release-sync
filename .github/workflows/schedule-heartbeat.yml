name: Schedule Heartbeat

on:
  # schedule:
  #   - cron: "*/6 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule heartbeat
        run: |
          echo "event=${{ github.event_name }}"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
